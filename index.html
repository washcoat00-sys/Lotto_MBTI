<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lotto Number Generator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="theme-switch-wrapper">
        <button id="theme-toggle">🌙 Dark Mode</button>
    </div>
    <div class="container">
        <h1>Lotto Number Generator</h1>
        <div class="numbers-container"></div>
        <button id="generate-btn">Generate Numbers</button>
    </div>

    <div class="contact-form-container">
        <h2>제휴 및 문의</h2>
        <form action="https://formspree.io/f/xreyqbjj" method="POST">
            <div class="form-group">
                <label for="email">이메일</label>
                <input type="email" id="email" name="email" placeholder="email@example.com" required>
            </div>
            <div class="form-group">
                <label for="subject">문의 제목</label>
                <input type="text" id="subject" name="subject" value="[제휴 문의]" required>
            </div>
            <div class="form-group">
                <label for="message">문의 내용</label>
                <textarea id="message" name="message" rows="4" placeholder="문의 내용을 입력해주세요." required></textarea>
            </div>
            <button type="submit" id="submit-btn">보내기</button>
        </form>
    </div>

    <script src="main.js"></script>
</body>
</html>
