
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lotto & MBTI</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Lotto Number Generator</h1>
        <div class="numbers-container"></div>
        <button id="generate-btn">Generate Numbers</button>
    </div>

    <div class="mbti-container">
        <h2>MBTI Personality Assessment</h2>
        <div id="mbti-questions">
            <div class="question">
                <p>1. At a party, do you:</p>
                <label><input type="radio" name="q1" value="E"> Interact with many, including strangers</label><br>
                <label><input type="radio" name="q1" value="I"> Interact with a few, known to you</label><br>
            </div>
            <div class="question">
                <p>2. Are you more of a:</p>
                <label><input type="radio" name="q2" value="S"> Realistic person</label><br>
                <label><input type="radio" name="q2" value="N"> Imaginative person</label><br>
            </div>
            <div class="question">
                <p>3. When making a decision, are you more likely to:</p>
                <label><input type="radio" name="q3" value="T"> Decide with your head</label><br>
                <label><input type="radio" name="q3" value="F"> Decide with your heart</label><br>
            </div>
            <div class="question">
                <p>4. Do you prefer to:</p>
                <label><input type="radio" name="q4" value="J"> Have things settled and decided</label><br>
                <label><input type="radio" name="q4" value="P"> Be open to new information and options</label><br>
            </div>
        </div>
        <button id="mbti-submit-btn">Show My MBTI</button>
        <div id="mbti-result"></div>
    </div>

    <script src="main.js"></script>
</body>
</html>
